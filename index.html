<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Activist Aggregator</title>
    <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
    <header class="site-header">
        <div class="masthead">
            <div class="masthead-inner">
                <div class="brand-lockup">
                    <span class="brand-mark" aria-hidden="true">
                        <img class="brand-mark-image" src="assets/knight-logo.png" alt="">
                    </span>
                    <div class="brand-copy">
                        <span class="brand-name">Activist Aggregator</span>
                    </div>
                </div>
                <div class="masthead-note">Tracker · Filings · Presentations · Shorts</div>
            </div>
        </div>
        <div class="header-inner">
            <div class="header-copy">
                <p class="eyebrow">Primary filings, decks, and campaign moves in one screen.</p>
            </div>
            <div class="header-actions">
                <div class="header-stats" id="header-stats"></div>
                <button id="reading-list-toggle" class="header-btn" title="Reading List (r)" aria-label="Open reading list">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 2h10a1 1 0 011 1v11l-6-3-6 3V3a1 1 0 011-1z"/>
                    </svg>
                    <span>Reading List</span>
                    <span class="rl-badge" id="rl-badge" style="display:none">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="shell">
        <div class="tab-bar" role="tablist" aria-label="Content sections">
            <button id="tab-presentations" class="tab-btn active" data-tab="presentations" type="button" role="tab" aria-selected="true" aria-controls="list-container" tabindex="0">
                <span class="tab-label">Presentations</span>
                <span class="tab-count" id="tab-count-presentations"></span>
            </button>
            <button id="tab-announcements" class="tab-btn" data-tab="announcements" type="button" role="tab" aria-selected="false" aria-controls="list-container" tabindex="-1">
                <span class="tab-label">Campaign Tracker</span>
                <span class="tab-count" id="tab-count-announcements"></span>
            </button>
            <button id="tab-filings" class="tab-btn" data-tab="filings" type="button" role="tab" aria-selected="false" aria-controls="list-container" tabindex="-1">
                <span class="tab-label">Filings</span>
                <span class="tab-count" id="tab-count-filings"></span>
            </button>
            <button id="tab-all" class="tab-btn" data-tab="all" type="button" role="tab" aria-selected="false" aria-controls="list-container" tabindex="-1">
                <span class="tab-label">All</span>
                <span class="tab-count" id="tab-count-all"></span>
            </button>
            <button id="tab-shorts" class="tab-btn" data-tab="shorts" type="button" role="tab" aria-selected="false" aria-controls="list-container" tabindex="-1">
                <span class="tab-label">Shorts</span>
                <span class="tab-count" id="tab-count-shorts"></span>
            </button>
            <button id="tab-guide" class="tab-btn" data-tab="guide" type="button" role="tab" aria-selected="false" aria-controls="list-container" tabindex="-1">
                <span class="tab-label">Guide</span>
            </button>
        </div>

        <section class="control-panel">
            <div class="toolbar toolbar-primary">
                <div class="search-wrap">
                    <label class="sr-only" for="search-input">Search reports</label>
                    <input type="text" id="search-input" placeholder="Search activist, target, title, or filing...">
                </div>
                <div class="toolbar-actions">
                    <label class="sr-only" for="sort-select">Sort results</label>
                    <select id="sort-select" aria-label="Sort results">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="activist" id="sort-by-party">By Activist</option>
                    </select>
                    <div class="view-group shorts-subtabs" id="shorts-subtabs" aria-label="Shorts mode" style="display:none">
                        <button id="shorts-reports" class="view-btn shorts-view-btn active" type="button" aria-pressed="true">Reports</button>
                        <button id="shorts-signals" class="view-btn shorts-view-btn" type="button" aria-pressed="false">Signals</button>
                    </div>
                    <div class="view-group" aria-label="View mode">
                        <button id="view-list" class="view-btn active" type="button" aria-pressed="true">List</button>
                        <button id="view-campaigns" class="view-btn" type="button" aria-pressed="false">Campaigns</button>
                    </div>
                    <button id="toggle-filters" class="toolbar-btn" type="button" aria-expanded="false" aria-controls="filter-panel">Filters</button>
                </div>
            </div>

            <div class="toolbar toolbar-secondary collapsed" id="filter-panel">
                <div class="filter-group">
                    <label class="sr-only" for="activist-filter">Filter by activist</label>
                    <select id="activist-filter" aria-label="Filter by activist">
                        <option value="">All Activists</option>
                    </select>
                    <label class="sr-only" for="source-filter">Filter by source</label>
                    <select id="source-filter" aria-label="Filter by source">
                        <option value="">All Sources</option>
                    </select>
                    <label class="sr-only" for="type-filter">Filter by type</label>
                    <select id="type-filter" aria-label="Filter by type">
                        <option value="">All Types</option>
                        <option value="activist_campaign_demand">Campaign Demand</option>
                        <option value="activist_stake_disclosure">Stake Disclosure</option>
                        <option value="activist_public_letter">Public Letter</option>
                        <option value="activist_press_release">Press Release</option>
                        <option value="company_board_change">Board Change</option>
                        <option value="company_settlement">Settlement</option>
                        <option value="company_strategic_review">Strategic Review</option>
                    </select>
                    <label class="sr-only" for="sector-filter">Filter by sector</label>
                    <select id="sector-filter" aria-label="Filter by sector">
                        <option value="">All Sectors</option>
                    </select>
                    <label class="sr-only" for="filing-scope-filter">Filter filings by filer scope</label>
                    <select id="filing-scope-filter" aria-label="Filter filings by filer scope" style="display:none">
                        <option value="all">All Filers</option>
                        <option value="activist-firms">Activist Firms Only</option>
                    </select>
                    <label class="sr-only" for="filer-role-filter">Filter filings by filer role</label>
                    <select id="filer-role-filter" aria-label="Filter filings by filer role" style="display:none">
                        <option value="">All Filer Roles</option>
                    </select>
                    <label class="sr-only" for="campaign-status-filter">Filter tracker by campaign status</label>
                    <select id="campaign-status-filter" aria-label="Filter tracker by campaign status" style="display:none">
                        <option value="">All Campaign Statuses</option>
                    </select>
                    <label class="sr-only" for="recency-filter">Filter by recency</label>
                    <select id="recency-filter" aria-label="Filter by recency">
                        <option value="">Any Time</option>
                        <option value="7d">Last 7 Days</option>
                        <option value="30d">Last 30 Days</option>
                        <option value="90d">Last 90 Days</option>
                        <option value="ytd">Year to Date</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="stats-bar" id="stats-bar"></div>
        <div class="list-container" id="list-container" role="tabpanel" tabindex="-1"></div>
    </main>

    <aside class="reading-list-sidebar" id="reading-list-sidebar" aria-label="Reading list">
        <div class="rl-header">
            <div>
                <p class="eyebrow">Working Tray</p>
                <h2>Reading List</h2>
            </div>
            <button id="rl-close" class="rl-close-btn" title="Close" aria-label="Close reading list">&times;</button>
        </div>
        <div class="rl-body" id="rl-body">
            <div class="rl-empty">No documents saved yet.</div>
        </div>
        <div class="rl-footer" id="rl-footer" style="display:none">
            <div class="rl-footer-copy">
                <strong>Export</strong>
                <span>Download PDFs and link manifests, or email yourself a clean digest.</span>
            </div>
            <div class="rl-export-row">
                <button id="rl-email-btn" class="rl-action-btn">Email</button>
                <button id="rl-download-btn" class="rl-action-btn rl-action-primary">Download ZIP</button>
            </div>
            <div class="rl-email-form" id="rl-email-form" style="display:none">
                <input type="email" id="rl-email-input" placeholder="you@example.com">
                <button id="rl-email-send" class="rl-action-btn rl-action-primary">Send</button>
            </div>
            <button id="rl-clear-btn" class="rl-clear-btn">Clear reading list</button>
        </div>
    </aside>
    <div class="rl-overlay" id="rl-overlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js?v=18"></script>
</body>
</html>
